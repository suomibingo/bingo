<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo - QR & Lisäarvonta</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #2c3e50;
            --white: #ffffff;
            --green: #27ae60;
            --blue: #2980b9;
            --red: #e74c3c;
            --yellow: #f1c40f;
            --purple: #8e44ad;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
        }

        #setup {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 350px;
            margin-top: 50px;
        }

        .btn {
            border: none;
            padding: 15px 25px;
            margin: 10px auto;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            display: block;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-green { background: var(--green); color: white; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-purple { background: var(--purple); color: white; }

        #game-area { display: none; text-align: center; width: 100%; max-width: 600px; }
        
        .board-info { font-size: 14px; color: #bdc3c7; margin-bottom: 10px; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 20px; display: inline-block; }

        .bingo-table {
            border-collapse: collapse;
            margin: 10px auto;
            background: white;
            color: #333;
            box-shadow: 0 0 30px rgba(0,0,0,0.4);
        }

        .bingo-table th { background: var(--yellow); padding: 10px; border: 2px solid #333; font-size: 22px; color: #2c3e50; }
        .bingo-table td { border: 2px solid #333; width: 60px; height: 60px; text-align: center; font-size: 24px; font-weight: bold; cursor: pointer; position: relative; }

        .marked::after {
            content: ""; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 50px; height: 50px;
            border: 5px solid var(--red); border-radius: 50%; pointer-events: none; box-sizing: border-box;
        }

        tr.row-complete td::before {
            content: ""; position: absolute; top: 50%; left: -2px; right: -2px;
            height: 8px; background: rgba(231, 76, 60, 0.6); z-index: 10; pointer-events: none;
        }

        .star-cell { color: var(--yellow); font-size: 40px !important; text-shadow: 1px 1px 2px #000; }
        .spacer-row { height: 15px; background: #bdc3c7; border: none; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000;
            justify-content: center; align-items: center; flex-direction: column;
        }

        .modal-content {
            background: white; color: #333; padding: 25px;
            border-radius: 20px; width: 85%; max-width: 380px; text-align: center;
        }

        #reader { width: 100%; min-height: 250px; background: #000; border-radius: 10px; overflow: hidden; }
        #status-display { padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 15px; display: none; }
        
        .msg-err { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .msg-ok { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        .extra-draw-number { font-size: 48px; font-weight: 900; color: var(--purple); margin: 20px 0; letter-spacing: 5px; }
        #extra-draw-qr { margin: 10px auto; display: block; border: 10px solid white; }
    </style>
</head>
<body>

    <!-- ALOITUS -->
    <div id="setup">
        <h1 style="color:#2c3e50; margin:0 0 20px 0;">BINGO</h1>
        <button class="btn btn-green" onclick="startGame('pieni')">Pieni (5x5)</button>
        <button class="btn btn-blue" onclick="startGame('iso')">Iso (3 x 15)</button>
    </div>

    <!-- PELIALUE -->
    <div id="game-area">
        <div class="board-info">Luotu: <span id="board-time"></span></div>
        <table class="bingo-table" id="bingo-board"></table>
        <div style="margin-top: 20px; display: flex; flex-direction: column; align-items: center;">
            <button class="btn btn-orange" style="width: 250px;" onclick="openScanner()">SKANNAA QR (Tarkista)</button>
            <button class="btn btn-purple" style="width: 250px;" onclick="openExtraDraw()">LISÄARVONTA</button>
            <button class="btn btn-red" style="width: 200px; padding: 10px; font-size: 14px; margin-top: 20px;" onclick="openQuitModal()">Lopeta peli</button>
        </div>
    </div>

    <!-- LISÄARVONTA MODAALI -->
    <div id="extra-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin:0; color: var(--purple);">Lisäarvonta</h2>
            <p>Sinun onnennumerosi:</p>
            <div id="extra-number-display" class="extra-draw-number">000000</div>
            <img id="extra-draw-qr" src="" alt="QR Koodi" width="200" height="200">
            <button class="btn btn-blue" style="margin-top: 15px;" onclick="closeExtraDraw()">SULJE</button>
        </div>
    </div>

    <!-- QR TARKISTUSIKKUNA -->
    <div id="qr-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin:0;">Skannaa QR-koodi</h2>
            <div id="reader"></div>
            <div id="status-display"></div>
            <button class="btn btn-blue" style="margin-top: 15px;" onclick="closeScanner()">SULJE</button>
        </div>
    </div>

    <!-- LOPETUSVARMISTUS -->
    <div id="quit-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin:0; color:var(--red);">Lopetetaanko?</h2>
            <p>Haluatko varmasti palata alkuun?</p>
            <div style="display:flex; gap:10px; justify-content: center; margin-top: 20px;">
                <button class="btn" style="background:#ccc; color:#333; margin:0; width: auto; padding: 10px 30px;" onclick="closeQuitModal()">Palaa</button>
                <button class="btn btn-red" style="margin:0; width: auto; padding: 10px 30px;" onclick="window.location.reload()">Lopeta</button>
            </div>
        </div>
    </div>

<script>
    let html5QrCode = null;
    let extraNumber = ""; 

    // --- PELIN HALLINTA ---
    function startGame(type) {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        document.getElementById('board-time').innerText = new Date().toLocaleTimeString('fi-FI');
        
        // Luodaan onnennumero pelin alussa
        extraNumber = Math.floor(100000 + Math.random() * 900000).toString();
        
        createBoard(type);
    }

    function openExtraDraw() {
        document.getElementById('extra-number-display').innerText = extraNumber;
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${extraNumber}`;
        document.getElementById('extra-draw-qr').src = qrUrl;
        document.getElementById('extra-modal').style.display = 'flex';
    }

    function closeExtraDraw() { document.getElementById('extra-modal').style.display = 'none'; }
    function openQuitModal() { document.getElementById('quit-modal').style.display = 'flex'; }
    function closeQuitModal() { document.getElementById('quit-modal').style.display = 'none'; }

    // --- RUUDUKON LUONTI ---
    function createBoard(type) {
        const board = document.getElementById('bingo-board');
        board.innerHTML = "<thead><tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr></thead>";
        const tbody = document.createElement('tbody');
        const colData = [];
        for (let c = 0; c < 5; c++) {
            let start = (c * 15) + 1;
            colData.push(Array.from({length: 15}, (_, i) => start + i).sort(() => Math.random() - 0.5));
        }
        const rowsCount = (type === 'iso') ? 15 : 5;
        for (let r = 0; r < rowsCount; r++) {
            if (type === 'iso' && r > 0 && r % 5 === 0) {
                let sp = document.createElement('tr'); sp.className = 'spacer-row';
                for(let i=0; i<5; i++) sp.appendChild(document.createElement('td'));
                tbody.appendChild(sp);
            }
            let tr = document.createElement('tr');
            for (let c = 0; c < 5; c++) {
                const td = document.createElement('td');
                let isStar = (type==='pieni'&&r===2&&c===2) || (type==='iso'&&(r===2||r===7||r===12)&&c===2);
                if (isStar) { td.innerHTML = "★"; td.classList.add('star-cell', 'marked'); } 
                else { td.innerText = colData[c][r % 15]; }
                td.onclick = function() { 
                    if(this.innerText || this.innerHTML.includes("★")) {
                        this.classList.toggle('marked');
                        checkRow(this.parentElement);
                    }
                };
                tr.appendChild(td);
            }
            tbody.appendChild(tr);
            checkRow(tr);
        }
        board.appendChild(tbody);
    }

    function checkRow(row) {
        let cells = row.querySelectorAll('td');
        if (cells.length < 5) return;
        let full = true;
        cells.forEach(c => { if(!c.classList.contains('marked')) full = false; });
        if(full) row.classList.add('row-complete'); else row.classList.remove('row-complete');
    }

    // --- QR SKANNERI ---
    async function openScanner() {
        document.getElementById('qr-modal').style.display = 'flex';
        document.getElementById('status-display').style.display = 'none';
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (qrText) => { verifyBingo(qrText); })
        .catch(() => { alert("Kameravirhe."); });
    }

    async function closeScanner() {
        if (html5QrCode && html5QrCode.getState() > 1) await html5QrCode.stop();
        document.getElementById('qr-modal').style.display = 'none';
    }

    function verifyBingo(qrData) {
        if (html5QrCode) html5QrCode.stop().catch(() => {});
        const called = (qrData.match(/\d+/g) || []).map(Number);
        const display = document.getElementById('status-display');
        display.style.display = 'block';
        let marked = [];
        document.querySelectorAll('td.marked').forEach(td => {
            let n = parseInt(td.innerText); if(!isNaN(n)) marked.push(n);
        });
        let invalid = marked.filter(n => !called.includes(n));
        if (invalid.length > 0) {
            display.className = "msg-err"; display.innerHTML = "🔴 HUIJAUS!<br>Merkitty numeroita, joita ei ole huudettu: " + invalid.join(", ");
        } else {
            if (document.querySelector('tr.row-complete:not(.spacer-row)')) {
                display.className = "msg-ok"; display.innerHTML = "✅ BINGO ON AITO! 🎉";
            } else {
                display.className = "msg-err"; display.innerHTML = "⚠️ EI BINGOA.<br>Rivi ei ole täynnä.";
            }
        }
    }
</script>
</body>
</html>
